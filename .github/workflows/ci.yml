name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff
      - name: Lint (ruff)
        run: ruff check --select F app
      - name: Tests (pytest)
        run: pytest -q

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Unit tests (vitest)
        run: npm run test
      - name: Build
        run: npm run build

  e2e:
    name: E2E smoke (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Install frontend deps + build
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      # Boot the backend and run the smoke in ONE step: a background process
      # started in a step is killed when that step ends, so it must stay in the
      # same shell as the test run.
      - name: Boot backend (demo) + run E2E smoke
        env:
          DEMO_MODE: "true"
          SCHEDULER_ENABLED: "false"
          LIVE_REFRESH_ENABLED: "false"
          DIGEST_ENABLED: "false"
          CORS_ORIGINS: "http://localhost:4173"
        run: |
          (cd backend && uvicorn app.main:app --host 0.0.0.0 --port 8000 &)
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && break
            sleep 1
          done
          curl -sf http://localhost:8000/health || (echo "backend failed to start" && exit 1)
          cd frontend && npm run test:e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
