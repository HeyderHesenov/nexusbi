<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- CSP is injected at BUILD time by the cspPlugin in vite.config.ts (not in
         dev, where Vite needs inline react-refresh scripts). If the inline
         theme-init <script> below changes, update its sha256 in that plugin. -->
    <link rel="preconnect" href="https://accounts.google.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='6' fill='%23131418'/%3E%3Cg stroke='%230E9F6E' stroke-width='1.4' opacity='0.6'%3E%3Cline x1='7' y1='7' x2='17' y2='7'/%3E%3Cline x1='7' y1='7' x2='7' y2='17'/%3E%3Cline x1='17' y1='7' x2='17' y2='17'/%3E%3Cline x1='7' y1='17' x2='17' y2='17'/%3E%3Cline x1='7' y1='7' x2='17' y2='17'/%3E%3C/g%3E%3Cg fill='%23131418' stroke='%230E9F6E' stroke-width='1.4'%3E%3Ccircle cx='7' cy='7' r='2'/%3E%3Ccircle cx='17' cy='7' r='2'/%3E%3Ccircle cx='7' cy='17' r='2'/%3E%3C/g%3E%3Ccircle cx='17' cy='17' r='2.4' fill='%230E9F6E'/%3E%3C/svg%3E"
    />
    <title>NexusBI — Words to Dashboards</title>
    <script>
      // Apply saved theme before first paint to avoid a flash. Default: light.
      try {
        if (localStorage.getItem('nexusbi_theme') === 'dark') {
          document.documentElement.classList.add('dark')
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
